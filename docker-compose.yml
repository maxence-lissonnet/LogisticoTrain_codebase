services:
  sqldatabase:
    image: mariadb:11
    container_name: logistico-sqldatabase
    restart: always
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_general_ci
    environment:
      MARIADB_DATABASE: myrames-prod-db
      MARIADB_USER_FILE: /run/secrets/mariadb_user
      MARIADB_PASSWORD_FILE: /run/secrets/mariadb_password
      MARIADB_ROOT_PASSWORD_FILE: /run/secrets/mariadb_root_password
    volumes:
      - sqldb-data:/var/lib/mysql
      - ./Initialisation_db:/docker-entrypoint-initdb.d:ro
    secrets:
      - mariadb_root_password
      - mariadb_user
      - mariadb_password
    networks:
      - db-net
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root -p$MYSQL_ROOT_PASSWORD --silent"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

  nosqldatabase:
    image: mongo:6.0
    container_name: logistico-nosqldatabase
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD_FILE: /run/secrets/mongo_root_password
    volumes:
      - nosqldb-data:/data/db
    secrets:
      - mongo_root_password
    networks:
      - db-net
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --host 127.0.0.1 --eval 'db.adminCommand({ ping: 1 })'"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s

  broker:
    image: rabbitmq:3.12-management-alpine
    container_name: logistico-broker
    restart: always
    command: ["sh", "-lc", "rabbitmq-plugins enable --offline rabbitmq_stomp rabbitmq_web_stomp >/dev/null 2>&1 || true; exec rabbitmq-server"]
    environment:
      RABBITMQ_DEFAULT_USER_FILE: /run/secrets/rabbitmq_user
      RABBITMQ_DEFAULT_PASS_FILE: /run/secrets/rabbitmq_password
    volumes:
      - broker-data:/var/lib/rabbitmq
    secrets:
      - rabbitmq_user
      - rabbitmq_password
    networks:
      - mqt-net
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

  restapi:
    build: ./RESTApi
    container_name: logistico-restapi
    restart: always
    depends_on:
      sqldatabase:
        condition: service_healthy
      nosqldatabase:
        condition: service_healthy
    volumes:
      - ./secrets/restapi/config.py:/app/config.py:ro
    networks:
      - db-net
      - frontend-net
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; socket.create_connection(('127.0.0.1',5001),2).close()\""]
      interval: 10s
      timeout: 10s
      retries: 10

  wsapi:
    image: maven:3.9.9-eclipse-temurin-21
    container_name: logistico-wsapi
    restart: always
    working_dir: /workspace
    command: ["sh", "-lc", "mvn -q -DskipTests spring-boot:run -Dspring-boot.run.arguments=--spring.config.location=file:/config/application.properties"]
    depends_on:
      sqldatabase:
        condition: service_healthy
      nosqldatabase:
        condition: service_healthy
      broker:
        condition: service_healthy
    volumes:
      - ./RealtimeAPI:/workspace
      - wsapi-m2:/root/.m2
      - wsapi-target:/workspace/target
      - ./secrets/wsapi/application.properties:/config/application.properties:ro
    networks:
      - db-net
      - mqt-net
      - frontend-net

  webapp:
    build:
      context: ./app
      dockerfile: Dockerfile
    image: logistico-webapp-builder
    container_name: logistico-webapp
    profiles: ["build"]
    user: root
    working_dir: /workspace
    command: ["sh", "-lc", "npm ci --legacy-peer-deps && PUBLIC_PATH=/ API_BASE_URL=/api RT_API_BASE_URL=/wsapi npm run build"]
    volumes:
      - ./app:/workspace
      - webapp-node-modules:/workspace/node_modules
      - webapp-build:/workspace/build

  front:
    image: nginx:1.27-alpine
    container_name: logistico-front
    restart: always
    depends_on:
      restapi:
        condition: service_started
      wsapi:
        condition: service_started
    ports:
      - "127.0.0.1:8080:80"
    volumes:
      - webapp-build:/var/www/app:ro
      - ./vendorConfigurations/nginx.docker.conf:/etc/nginx/nginx.conf:ro
    networks:
      - frontend-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: logistico-phpmyadmin
    profiles: ["dev-tool"]
    restart: always
    ports:
      - "127.0.0.1:8081:80"
    environment:
      PMA_HOST: sqldatabase
      PMA_PORT: 3306
    networks:
      - db-net
    depends_on:
      sqldatabase:
        condition: service_healthy

  mongo-express:
    image: mongo-express:latest
    container_name: logistico-mongo-express
    profiles: ["dev-tool"]
    restart: always
    ports:
      - "127.0.0.1:8082:8081"
    environment:
      ME_CONFIG_MONGODB_SERVER: nosqldatabase
      ME_CONFIG_MONGODB_PORT: 27017
      ME_CONFIG_MONGODB_ADMINUSERNAME: root
      ME_CONFIG_MONGODB_ADMINPASSWORD_FILE: /run/secrets/mongo_root_password
      ME_CONFIG_BASICAUTH: "false"
    secrets:
      - mongo_root_password
    networks:
      - db-net
    depends_on:
      nosqldatabase:
        condition: service_healthy

volumes:
  sqldb-data:
  nosqldb-data:
  broker-data:
  wsapi-m2:
  wsapi-target:
  webapp-node-modules:
  webapp-build:

networks:
  db-net:
  mqt-net:
  frontend-net:

secrets:
  mariadb_root_password:
    file: ./secrets/mariadb_root_password.txt
  mariadb_user:
    file: ./secrets/mariadb_user.txt
  mariadb_password:
    file: ./secrets/mariadb_password.txt
  mongo_root_password:
    file: ./secrets/mongo_root_password.txt
  rabbitmq_user:
    file: ./secrets/rabbitmq_user.txt
  rabbitmq_password:
    file: ./secrets/rabbitmq_password.txt
