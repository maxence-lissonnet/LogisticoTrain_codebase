services:
  broker:
    image: rabbitmq:3.12-management-alpine
    container_name: logistico-broker
    networks:
      - mqt-net
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "-q", "ping" ]
      interval: 10s
      timeout: 10s
      retries: 10
    restart: always
    environment:
      RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS: "-rabbitmq_stomp tcp_listener [6163]"
    secrets:
      - rabbit_user
      - rabbit_password

  restapi:
    build: ./RESTApi
    container_name: logistico-restapi
    restart: always
    depends_on:
      sqldatabase:
        condition: service_healthy
      nosqldatabase:
        condition: service_healthy
    networks:
      - db-net
      - frontend-net
    secrets:
      - db_prod_creds
      - db_history_creds
