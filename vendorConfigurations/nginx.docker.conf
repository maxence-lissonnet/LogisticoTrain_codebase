user nginx;
worker_processes auto;

error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for"';

  access_log /var/log/nginx/access.log main;
  sendfile on;
  tcp_nopush on;
  server_names_hash_bucket_size 128;
  keepalive_timeout 65s;

  map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
  }

  server {
    listen 80;
    listen [::]:80;
    server_name logisticotrain;

    set $rest_api_backend restapi:5001;
    set $ws_api_backend wsapi:8080;

    server_tokens off;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "0;" always;
    add_header X-Robots-Tag "none" always;
    add_header X-Download-Options "noopen" always;
    add_header X-Permitted-Cross-Domain-Policies "none" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    fastcgi_hide_header X-Powered-By;

    client_max_body_size 10M;
    client_body_timeout 300s;
    fastcgi_buffers 64 4K;

    gzip on;
    gzip_vary on;
    gzip_comp_level 4;
    gzip_min_length 256;
    gzip_proxied expired no-cache no-store private no_last_modified no_etag auth;
    gzip_types application/atom+xml application/javascript application/json application/ld+json application/manifest+json application/rss+xml application/vnd.geo+json application/vnd.ms-fontobject application/x-font-ttf application/x-web-app-manifest+json application/xhtml+xml application/xml font/opentype image/svg+xml text/css text/javascript text/plain text/xml;

    client_body_buffer_size 512k;

    root /var/www/app;
    index index.html;
    resolver 127.0.0.11;

    location ~* ^/api {
      rewrite /api/?(.*) /api/$1 break;
      proxy_pass http://$rest_api_backend;
      proxy_http_version 1.1;
      proxy_redirect off;
      client_max_body_size 100m;
      proxy_set_header Host $http_host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Host $http_host;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 180s;
      proxy_buffering off;
      proxy_buffer_size 128k;
      proxy_buffers 100 128k;
    }

    location ~* ^/wsapi {
      rewrite /wsapi/?(.*) /api/$1 break;
      proxy_pass http://$ws_api_backend;
      proxy_http_version 1.1;
      proxy_redirect off;
      client_max_body_size 100m;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $http_host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Host $http_host;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 180s;
      proxy_buffering off;
      proxy_buffer_size 128k;
      proxy_buffers 100 128k;
    }

    location = /health {
      access_log off;
      add_header Content-Type application/json;
      return 200 '{"status":"UP"}';
    }

    try_files $uri /index.html;
  }
}
