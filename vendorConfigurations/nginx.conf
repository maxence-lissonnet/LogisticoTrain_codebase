user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types; 
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile on;
    tcp_nopush on;
    server_names_hash_bucket_size 128;
    keepalive_timeout 65s;

    # Variable mapping for reverse proxying
    map $http_host $this_host {
        "" $host;
        default $http_host;
    }
    map $http_x_forwarded_proto $the_scheme {
        default $http_x_forwarded_proto;
        "" $scheme;
    }
    map $http_x_forwarded_host $the_host {
        default $http_x_forwarded_host;
        "" $this_host;
    }
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 80;
        listen [::]:80;
        server_name localhost;

        # Dossier racine où se trouve ton index.html (doit correspondre au volume Docker)
        root /var/www/app;
        index index.html;

        # DNS interne de Docker
        resolver 127.0.0.11 valid=30s;

        ###################################
        #   BACKEND SERVERS DEFINITIONS   #
        ###################################
        # Note: On ajoute les ports car Nginx par défaut cherche le 80
        set $rest_api_backend restapi.fr:5001;
        set $ws_api_backend wsapi:8080;

        # Sécurité : Suppression des tokens serveurs
        server_tokens off;

        # Default headers & CORS Bypass
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "0;" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        
        # Autorisation CORS Globale (très important pour tes erreurs rouges)
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;

        client_max_body_size 10M;
        client_body_timeout 300s;

        # Proxy REST API
        location ~* ^/api {
            # Gestion du Preflight CORS
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '*';
                add_header 'Access-Control-Max-Age' 1728000;
                add_header 'Content-Type' 'text/plain; charset=utf-8';
                add_header 'Content-Length' 0;
                return 204;
            }

            rewrite /api/?(.*) /api/$1 break;
            proxy_pass http://$rest_api_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $the_scheme;
        }

        # Proxy RealTime API (WebSockets)
        location ~* ^/wsapi {
            rewrite /wsapi/?(.*) /api/$1 break;
            proxy_pass http://$ws_api_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location = /health {
            access_log off;
            add_header 'Content-Type' 'application/json';
            return 200 '{"status":"UP"}';
        }

        # Gestion du Front-end React
        location / {
            try_files $uri $uri/ /index.html =404;
        }
    }
}